spring.application.name=IN10NT Employee Management

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/in10nt_ems?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JSON Date Format
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# JWT Configuration
jwt.secret=IN10NT_SECRET_KEY_FOR_JWT_TOKEN_GENERATION_2024
jwt.expiration=86400000

# Server Configuration
server.port=8081

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.in10nt.ems=DEBUG
